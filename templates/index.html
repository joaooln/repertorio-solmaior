<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Repertório Sol Maior</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #0f0e0c;
  --bg2:    #161410;
  --bg3:    #1e1c19;
  --card:   #1a1815;
  --border: #2a2720;
  --gold:   #d4a853;
  --gold2:  #f0c97a;
  --red:    #c0392b;
  --green:  #27ae60;
  --blue:   #2980b9;
  --text:   #f0ece4;
  --text2:  #9a9080;
  --text3:  #5e5648;
  --r:      10px;
  --font-d: 'Playfair Display', serif;
  --font-b: 'DM Sans', sans-serif;
  --font-m: 'DM Mono', monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);min-height:100vh}

/* ── Layout ── */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:230px;min-width:230px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column}
.main{flex:1;overflow-y:auto;padding:36px 40px}

/* ── Sidebar ── */
.logo{padding:22px 20px 20px;border-bottom:1px solid var(--border)}
.logo-title{font-family:var(--font-d);font-size:18px;color:var(--gold);line-height:1.15}
.logo-sub{font-size:11px;color:var(--text3);margin-top:4px;font-weight:300;letter-spacing:.03em}
.nav{flex:1;padding:12px 0;overflow-y:auto}
.nav-section{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;padding:12px 20px 6px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);border:none;background:none;width:100%;text-align:left;transition:all .15s;border-left:3px solid transparent}
.nav-item:hover{color:var(--text);background:var(--bg3)}
.nav-item.active{color:var(--gold);border-left-color:var(--gold);background:rgba(212,168,83,.07)}
.nav-item .ico{font-size:15px;width:20px;text-align:center}
.nav-footer{padding:16px 20px;border-top:1px solid var(--border)}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;margin-right:6px}
.status-text{font-size:11px;color:var(--text3)}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;font-family:var(--font-b);white-space:nowrap}
.btn-primary{background:var(--gold);color:#0f0e0c}
.btn-primary:hover{background:var(--gold2)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text);border-color:var(--text3)}
.btn-danger{background:transparent;color:var(--red);border:1px solid rgba(192,57,43,.3)}
.btn-danger:hover{background:rgba(192,57,43,.1)}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover{background:#2ecc71}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px;border-radius:6px}
.btn-icon{padding:6px;border-radius:7px}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* ── Page header ── */
.page-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:28px;gap:16px}
.page-title{font-family:var(--font-d);font-size:26px}
.page-sub{font-size:12px;color:var(--text3);margin-top:4px}
.page-actions{display:flex;gap:8px;flex-wrap:wrap}

/* ── Cards grid ── */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}

/* ── Music card ── */
.music-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;gap:6px}
.music-card:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.mc-title{font-family:var(--font-d);font-size:15px;line-height:1.3}
.mc-artist{font-size:12px;color:var(--text3)}
.mc-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:2px}
.tag{font-size:10px;padding:2px 7px;border-radius:20px;background:rgba(212,168,83,.12);color:var(--gold);font-family:var(--font-m)}
.mc-actions{display:flex;gap:6px;margin-top:6px}

/* ── Rep card ── */
.rep-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px;transition:all .15s}
.rep-card:hover{border-color:rgba(212,168,83,.4)}
.rep-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.rep-title{font-family:var(--font-d);font-size:17px}
.rep-count{font-size:11px;color:var(--text3);margin-top:3px}
.rep-list{display:flex;flex-direction:column;gap:3px;margin-bottom:14px}
.rep-song{font-size:12px;color:var(--text2);padding:4px 0;border-bottom:1px solid var(--border)}
.rep-actions{display:flex;gap:6px}

/* ── Modal ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:28px;width:100%;max-height:92vh;overflow-y:auto}
.modal-sm{max-width:440px}
.modal-md{max-width:680px}
.modal-lg{max-width:820px}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
.modal-title{font-family:var(--font-d);font-size:21px}
.close-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:24px;line-height:1;padding:0 4px}
.close-btn:hover{color:var(--text)}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:24px;padding-top:20px;border-top:1px solid var(--border)}

/* ── Forms ── */
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em}
input,textarea,select{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 12px;font-family:var(--font-b);font-size:13px;width:100%;transition:border-color .15s;outline:none}
input:focus,textarea:focus,select:focus{border-color:var(--gold)}
textarea{resize:vertical;min-height:100px;font-family:var(--font-m);font-size:12px;line-height:1.9}

/* ── Tabs ── */
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:18px}
.tab{padding:9px 16px;font-size:13px;font-weight:500;cursor:pointer;color:var(--text3);border:none;border-bottom:2px solid transparent;background:none;font-family:var(--font-b);transition:all .15s;margin-bottom:-1px}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab:hover:not(.active){color:var(--text2)}

/* ── Search ── */
.search-wrap{position:relative;margin-bottom:18px}
.search-wrap input{padding-left:36px}
.search-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}

/* ── Drag list ── */
.drag-list{display:flex;flex-direction:column;gap:6px}
.drag-item{display:flex;align-items:center;gap:10px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 12px;transition:all .15s}
.drag-item:hover{border-color:rgba(212,168,83,.4)}
.drag-item.dragging{opacity:.4}
.drag-handle{color:var(--text3);cursor:grab;font-size:16px;user-select:none}
.drag-handle:active{cursor:grabbing}
.di-info{flex:1;min-width:0}
.di-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.di-artist{font-size:11px;color:var(--text3)}

/* ── Info box ── */
.info-box{background:rgba(212,168,83,.07);border:1px solid rgba(212,168,83,.2);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--text2);margin-bottom:14px;line-height:1.6}
.info-box strong{color:var(--gold)}

/* ── Empty state ── */
.empty{text-align:center;padding:70px 20px;color:var(--text3)}
.empty-ico{font-size:52px;margin-bottom:16px}
.empty h3{font-family:var(--font-d);font-size:20px;color:var(--text2);margin-bottom:8px}
.empty p{font-size:13px;line-height:1.7;max-width:300px;margin:0 auto 20px}

/* ── Toast ── */
.toast{position:fixed;bottom:24px;right:24px;padding:12px 18px;border-radius:9px;font-size:13px;font-weight:500;z-index:9999;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}

/* ── Loader ── */
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.2);border-top-color:currentColor;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9998;gap:16px}
.loading-overlay .spin{width:36px;height:36px;border-width:3px;color:var(--gold)}
.loading-msg{font-size:14px;color:var(--text2)}

/* ── Cifra editor ── */
.cifra-help{font-size:11px;color:var(--text3);margin-top:4px;line-height:1.6}

/* ── Transposição ── */
.transp-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.transp-btn{padding:6px 12px;font-family:var(--font-m);font-size:12px}
.tom-badge{background:rgba(212,168,83,.15);color:var(--gold);padding:4px 12px;border-radius:20px;font-family:var(--font-m);font-size:13px;font-weight:500}
.tom-orig{font-size:11px;color:var(--text3);margin-top:4px}

/* ── Two-col layout ── */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.col-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.avail-scroll{max-height:300px;overflow-y:auto;display:flex;flex-direction:column;gap:6px}
.avail-item{display:flex;align-items:center;gap:10px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 12px;cursor:pointer;transition:all .15s}
.avail-item:hover{border-color:var(--gold);background:rgba(212,168,83,.06)}

/* Scrollbar */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
hr.div{border:none;border-top:1px solid var(--border);margin:16px 0}
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-title">Repertório<br>Sol Maior</div>
      <div class="logo-sub">Sistema de Cifras 🎸</div>
    </div>
    <nav class="nav">
      <div class="nav-section">Biblioteca</div>
      <button class="nav-item active" onclick="page('musicas')" id="nav-musicas">
        <span class="ico">🎵</span> Músicas
      </button>
      <div class="nav-section">Shows</div>
      <button class="nav-item" onclick="page('repertorios')" id="nav-repertorios">
        <span class="ico">📋</span> Repertórios
      </button>
    </nav>
    <div class="nav-footer">
      <span class="status-dot"></span>
      <span class="status-text">Servidor ativo</span>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="app-main"></main>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════════════════
// API
// ══════════════════════════════════════════════════════════════════════
const api = {
  async get(url)    { const r=await fetch(url); return r.json() },
  async post(url,d) { const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)}); return r.json() },
  async put(url,d)  { const r=await fetch(url,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)}); return r.json() },
  async del(url)    { const r=await fetch(url,{method:'DELETE'}); return r.json() },
};

// ══════════════════════════════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════════════════════════════
function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = type==='err' ? '#c0392b' : type==='warn' ? '#e67e22' : '#27ae60';
  el.style.color = '#fff';
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 3200);
}

function loading(msg='Carregando...') {
  document.body.insertAdjacentHTML('beforeend',
    `<div class="loading-overlay" id="loading">
       <div class="spin"></div>
       <div class="loading-msg">${msg}</div>
     </div>`);
}
function unload() { document.getElementById('loading')?.remove(); }

function closeModal() { document.getElementById('modal-root')?.remove(); }

function modal(html, size='modal-md') {
  closeModal();
  document.body.insertAdjacentHTML('beforeend',
    `<div class="overlay" id="modal-root" onclick="if(event.target===this)closeModal()">
       <div class="modal ${size}">${html}</div>
     </div>`);
}

function confirm_del(msg, cb) {
  modal(`
    <div class="modal-header"><h3 class="modal-title">Confirmar</h3></div>
    <p style="color:var(--text2);font-size:14px;margin-bottom:24px">${msg}</p>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-danger" onclick="closeModal();(${cb.toString()})()">Excluir</button>
    </div>`, 'modal-sm');
}

// ══════════════════════════════════════════════════════════════════════
// NAVEGAÇÃO
// ══════════════════════════════════════════════════════════════════════
let currentPage = '';
function page(p) {
  currentPage = p;
  document.querySelectorAll('.nav-item').forEach(e=>e.classList.remove('active'));
  document.getElementById('nav-'+p).classList.add('active');
  if(p==='musicas') renderMusicas();
  else renderRepertorios();
}

// ══════════════════════════════════════════════════════════════════════
// MÚSICAS
// ══════════════════════════════════════════════════════════════════════
let mFilter = '';
let allMusicas = [];

async function renderMusicas() {
  allMusicas = await api.get('/api/musicas' + (mFilter ? `?q=${encodeURIComponent(mFilter)}` : ''));
  const counts = await api.get('/api/musicas');

  document.getElementById('app-main').innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">Banco de Músicas</div>
        <div class="page-sub">${counts.length} música${counts.length!==1?'s':''} cadastrada${counts.length!==1?'s':''}</div>
      </div>
      <div class="page-actions">
        <button class="btn btn-ghost" onclick="openImport()">🔗 Importar Link</button>
        <button class="btn btn-primary" onclick="openAddManual()">+ Adicionar</button>
      </div>
    </div>

    <div class="search-wrap">
      <span class="search-ico">🔍</span>
      <input placeholder="Buscar por título ou artista..." value="${mFilter}"
        oninput="mFilter=this.value; renderMusicas()">
    </div>

    ${allMusicas.length===0 ? `
      <div class="empty">
        <div class="empty-ico">🎵</div>
        <h3>${mFilter ? 'Nada encontrado' : 'Banco vazio'}</h3>
        <p>${mFilter ? 'Tente outro termo.' : 'Importe uma cifra via link ou adicione manualmente.'}</p>
        ${!mFilter ? `<button class="btn btn-primary" onclick="openImport()">🔗 Importar via Link</button>` : ''}
      </div>
    ` : `
      <div class="card-grid">
        ${allMusicas.map(m=>`
          <div class="music-card" onclick="openEdit('${m.id}')">
            <div class="mc-title">${m.titulo}</div>
            <div class="mc-artist">${m.artista}</div>
            <div class="mc-tags">
              <span class="tag">${m.tom}</span>
              ${m.tom !== m.tom_original ? `<span class="tag" style="background:rgba(192,57,43,.1);color:#e74c3c">orig: ${m.tom_original}</span>` : ''}
              ${m.url_origem ? `<span class="tag" style="background:rgba(41,128,185,.1);color:#5dade2">🔗</span>` : ''}
            </div>
            <div class="mc-actions" onclick="event.stopPropagation()">
              <button class="btn btn-ghost btn-sm" onclick="openEdit('${m.id}')">✏️ Editar</button>
              <button class="btn btn-danger btn-sm" onclick="delMusica('${m.id}','${m.titulo.replace(/'/g,"\\'")}')">🗑️</button>
            </div>
          </div>
        `).join('')}
      </div>
    `}`;
}

// ── Importar via link ──────────────────────────────────────────────────
function openImport() {
  modal(`
    <div class="modal-header">
      <h3 class="modal-title">🔗 Importar via Link</h3>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>
    <div class="info-box">
      Cole um link do <strong>Cifra Club</strong> ou <strong>Cifras.com.br</strong>.<br>
      O sistema extrai a cifra automaticamente usando IA.
    </div>
    <div class="form-group">
      <label>URL da Cifra</label>
      <input id="imp-url" type="url" placeholder="https://www.cifraclub.com.br/artista/musica/">
    </div>
    <div id="imp-msg" style="font-size:12px;color:var(--text3);min-height:18px"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="btn-imp" onclick="doImport()">Importar</button>
    </div>`, 'modal-md');
  document.getElementById('imp-url').focus();
}

async function doImport() {
  const url = document.getElementById('imp-url').value.trim();
  if(!url) { toast('Cole uma URL', 'err'); return; }
  const btn = document.getElementById('btn-imp');
  const msg = document.getElementById('imp-msg');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Importando...';
  msg.textContent = 'Consultando IA para extrair a cifra...';
  try {
    const r = await api.post('/api/musicas/importar', {url});
    if(r.erro) throw new Error(r.erro);
    closeModal();
    toast(`✅ "${r.titulo}" importada!`);
    mFilter = '';
    await renderMusicas();
    setTimeout(() => openEdit(r.id), 300);
  } catch(e) {
    msg.textContent = '❌ ' + e.message;
    btn.disabled = false;
    btn.innerHTML = 'Importar';
  }
}

// ── Adicionar manual ───────────────────────────────────────────────────
function openAddManual() {
  modal(`
    <div class="modal-header">
      <h3 class="modal-title">+ Nova Música</h3>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Título</label><input id="nm-titulo" placeholder="Nome da música"></div>
      <div class="form-group"><label>Artista</label><input id="nm-artista" placeholder="Nome do artista"></div>
    </div>
    <div class="form-group"><label>Tom</label><input id="nm-tom" placeholder="Ex: Am, D, G" style="width:130px"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="doAddManual()">Criar e Editar →</button>
    </div>`, 'modal-sm');
  document.getElementById('nm-titulo').focus();
}

async function doAddManual() {
  const titulo  = document.getElementById('nm-titulo').value.trim();
  const artista = document.getElementById('nm-artista').value.trim();
  const tom     = document.getElementById('nm-tom').value.trim() || 'C';
  if(!titulo||!artista) { toast('Preencha título e artista','err'); return; }
  const r = await api.post('/api/musicas', {titulo, artista, tom});
  closeModal();
  await renderMusicas();
  setTimeout(() => openEdit(r.id), 200);
}

// ── Editar música ──────────────────────────────────────────────────────
let editM = null;
let editTab = 'info';

async function openEdit(id, tab='info') {
  editTab = tab;
  const m = await api.get(`/api/musicas/${id}`);
  editM = m;
  renderEditModal();
}

function renderEditModal() {
  const m = editM;
  const cifraText = (m.cifra_tradicional||[]).map(l => {
    let s = '';
    if(l.secao) s += `[${l.secao}]\n`;
    if(l.acordes) s += l.acordes + '\n';
    if(l.letra)   s += l.letra   + '\n';
    return s;
  }).join('');

  const tabelaText = (m.tabela||[]).map(s =>
    `\n## ${s.nome_secao}\n` + (s.grid||[]).map(r=>r.join(' | ')).join('\n')
  ).join('\n');

  const diffSt = semitonesDiff(m.tom_original, m.tom);

  modal(`
    <div class="modal-header">
      <h3 class="modal-title">✏️ ${m.titulo}</h3>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>
    <div class="tabs">
      <button class="tab ${editTab==='info'?'active':''}"   onclick="switchTab('info')">Informações</button>
      <button class="tab ${editTab==='cifra'?'active':''}"  onclick="switchTab('cifra')">Cifra Tradicional</button>
      <button class="tab ${editTab==='tabela'?'active':''}" onclick="switchTab('tabela')">Tabela de Acordes</button>
    </div>

    ${editTab==='info' ? `
      <div class="form-row">
        <div class="form-group"><label>Título</label><input id="e-titulo" value="${m.titulo}"></div>
        <div class="form-group"><label>Artista</label><input id="e-artista" value="${m.artista}"></div>
      </div>
      <div class="form-group">
        <label>Tom Original</label>
        <input id="e-tom-orig" value="${m.tom_original}" style="width:130px">
      </div>
      <div class="form-group">
        <label>Tom Atual</label>
        <div class="transp-row">
          <span class="tom-badge" id="tom-disp">${m.tom}</span>
          <button class="btn btn-ghost transp-btn" onclick="doTransp(-1)">♭ −1</button>
          <button class="btn btn-ghost transp-btn" onclick="doTransp(+1)">♯ +1</button>
          <button class="btn btn-ghost btn-sm"      onclick="doTransp(0,true)">↺ Reset</button>
        </div>
        ${diffSt!==0 ? `<div class="tom-orig">Transposto ${diffSt>0?'+':''}${diffSt} semitons do original (${m.tom_original})</div>` : ''}
      </div>
      ${m.url_origem ? `
        <div class="form-group">
          <label>URL de origem</label>
          <input value="${m.url_origem}" readonly style="color:var(--text3);font-size:11px">
        </div>` : ''}
    ` : ''}

    ${editTab==='cifra' ? `
      <div class="info-box">
        <strong>[Seção]</strong> marca seção (Verso, Refrão…).<br>
        Linha de <strong>acordes</strong> vem antes da linha de <strong>letra</strong>.
      </div>
      <div class="form-group">
        <label>Cifra Completa</label>
        <textarea id="e-cifra" style="min-height:360px">${cifraText}</textarea>
      </div>
    ` : ''}

    ${editTab==='tabela' ? `
      <div class="info-box">
        <strong>## Nome da Seção</strong> cria nova seção.<br>
        Acordes separados por <strong>|</strong>, 4 por linha. <strong>%</strong> = repetir acorde.
      </div>
      <div class="form-group">
        <label>Tabela de Acordes</label>
        <textarea id="e-tabela" style="min-height:360px">${tabelaText}</textarea>
      </div>
    ` : ''}

    <div class="modal-footer">
      <button class="btn btn-danger btn-sm" onclick="delMusica('${m.id}','${m.titulo.replace(/'/g,"\\'")}',true)">🗑️ Excluir</button>
      <button class="btn btn-ghost" onclick="closeModal()">Fechar</button>
      <button class="btn btn-primary" onclick="doSave()">💾 Salvar</button>
    </div>
  `, 'modal-lg');
}

function switchTab(tab) {
  collectEdits();
  editTab = tab;
  renderEditModal();
}

function collectEdits() {
  if(!editM) return;
  if(document.getElementById('e-titulo'))   editM.titulo   = document.getElementById('e-titulo').value;
  if(document.getElementById('e-artista'))  editM.artista  = document.getElementById('e-artista').value;
  if(document.getElementById('e-tom-orig')) editM.tom_original = document.getElementById('e-tom-orig').value;
  if(document.getElementById('e-cifra'))    editM.cifra_tradicional = parseCifra(document.getElementById('e-cifra').value);
  if(document.getElementById('e-tabela'))   editM.tabela   = parseTabela(document.getElementById('e-tabela').value);
}

async function doSave() {
  collectEdits();
  await api.put(`/api/musicas/${editM.id}`, editM);
  closeModal();
  toast('✅ Salvo!');
  renderMusicas();
}

async function doTransp(st, reset=false) {
  collectEdits();
  const r = await api.post(`/api/musicas/${editM.id}/transpor`, {semitones: st, reset});
  if(r.ok) {
    editM = await api.get(`/api/musicas/${editM.id}`);
    renderEditModal();
    toast(`Tom: ${r.novo_tom}`);
  }
}

function semitonesDiff(orig, atual) {
  const NOTAS=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const ENH={'Db':'C#','Eb':'D#','Fb':'E','Gb':'F#','Ab':'G#','Bb':'A#','Cb':'B'};
  const norm = n => ENH[n]||n;
  const get  = t => { const m=t.match(/^([A-G][b#]?)/); return m ? NOTAS.indexOf(norm(m[1])) : -1; };
  const o=get(orig), a=get(atual);
  if(o<0||a<0) return 0;
  let d=a-o; if(d>6)d-=12; if(d<-6)d+=12;
  return d;
}

function parseCifra(text) {
  const lines = text.split('\n');
  const res = [];
  let secaoAtual = '';
  for(const line of lines) {
    const t = line.trim();
    if(!t) continue;
    const sm = t.match(/^\[(.+)\]$/);
    if(sm) { secaoAtual = sm[1]; continue; }
    const isChord = /^[A-G]/.test(t) && !/[a-z]{5,}/.test(t);
    if(isChord) {
      res.push({secao: secaoAtual, acordes: t, letra: ''});
      secaoAtual = '';
    } else {
      if(res.length && res[res.length-1].letra==='' && !res[res.length-1].secao && res[res.length-1].acordes) {
        res[res.length-1].letra = t;
      } else {
        res.push({secao: secaoAtual, acordes: '', letra: t});
        secaoAtual = '';
      }
    }
  }
  return res;
}

function parseTabela(text) {
  const lines = text.split('\n');
  const secoes = [];
  let cur = null;
  for(const line of lines) {
    const t = line.trim();
    if(!t) continue;
    if(t.startsWith('##')) {
      if(cur) secoes.push(cur);
      cur = {nome_secao: t.replace(/^##\s*/,''), grid: []};
    } else if(cur) {
      const cells = t.split('|').map(c=>c.trim()).filter(Boolean);
      if(cells.length) cur.grid.push(cells);
    }
  }
  if(cur) secoes.push(cur);
  return secoes;
}

async function delMusica(id, titulo, fromModal=false) {
  confirm_del(`Excluir "<strong>${titulo}</strong>"? Será removida de todos os repertórios.`, async()=>{
    await api.del(`/api/musicas/${id}`);
    toast('🗑️ Música removida');
    renderMusicas();
  });
}

// ══════════════════════════════════════════════════════════════════════
// REPERTÓRIOS
// ══════════════════════════════════════════════════════════════════════
let allReps = [];

async function renderRepertorios() {
  allReps = await api.get('/api/repertorios');
  document.getElementById('app-main').innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">Repertórios</div>
        <div class="page-sub">${allReps.length} repertório${allReps.length!==1?'s':''}</div>
      </div>
      <button class="btn btn-primary" onclick="openNovoRep()">+ Novo Repertório</button>
    </div>

    ${allReps.length===0 ? `
      <div class="empty">
        <div class="empty-ico">📋</div>
        <h3>Nenhum repertório</h3>
        <p>Crie um repertório para organizar suas músicas.</p>
        <button class="btn btn-primary" onclick="openNovoRep()">+ Criar</button>
      </div>
    ` : `
      <div class="card-grid">
        ${allReps.map(r => {
          const songs = r.musicas||[];
          return `
            <div class="rep-card">
              <div class="rep-header">
                <div>
                  <div class="rep-title">${r.nome}</div>
                  <div class="rep-count">${songs.length} música${songs.length!==1?'s':''}</div>
                </div>
                <div style="display:flex;gap:6px">
                  <button class="btn btn-ghost btn-sm btn-icon" onclick="openEditRep('${r.id}')" title="Gerenciar">✏️</button>
                  <button class="btn btn-danger btn-sm btn-icon" onclick="delRep('${r.id}','${r.nome.replace(/'/g,"\\'")}')">🗑️</button>
                </div>
              </div>
              <div class="rep-list">
                ${songs.slice(0,5).map((s,i)=>`
                  <div class="rep-song">${i+1}. ${s.titulo} <span style="color:var(--text3)">— ${s.artista}</span></div>
                `).join('')}
                ${songs.length>5 ? `<div class="rep-song" style="color:var(--text3)">+ ${songs.length-5} mais…</div>` : ''}
                ${songs.length===0 ? `<div style="color:var(--text3);font-size:12px;padding:8px 0">Sem músicas ainda</div>` : ''}
              </div>
              <div class="rep-actions">
                <button class="btn btn-ghost btn-sm" onclick="openEditRep('${r.id}')">Gerenciar</button>
                <button class="btn btn-green btn-sm" onclick="gerarPDF('${r.id}','${r.nome.replace(/'/g,"\\'")}')">📄 PDF</button>
              </div>
            </div>`;
        }).join('')}
      </div>
    `}`;
}

function openNovoRep() {
  modal(`
    <div class="modal-header">
      <h3 class="modal-title">Novo Repertório</h3>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>
    <div class="form-group">
      <label>Nome</label>
      <input id="rep-nome" placeholder="Ex: Casamento João e Maria">
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="doNovoRep()">Criar →</button>
    </div>`, 'modal-sm');
  document.getElementById('rep-nome').focus();
}

async function doNovoRep() {
  const nome = document.getElementById('rep-nome').value.trim();
  if(!nome) { toast('Digite um nome','err'); return; }
  const r = await api.post('/api/repertorios', {nome});
  closeModal();
  await renderRepertorios();
  setTimeout(()=>openEditRep(r.id), 200);
}

// ── Editar repertório ──────────────────────────────────────────────────
let editRep = null;
let dragSrc = null;

async function openEditRep(id) {
  const reps = await api.get('/api/repertorios');
  editRep = reps.find(r=>r.id===id);
  if(!editRep) return;
  const todasMusicas = await api.get('/api/musicas');
  const selecionadasIds = (editRep.musicas||[]).map(m=>m.id);
  const disponiveis = todasMusicas.filter(m=>!selecionadasIds.includes(m.id));

  modal(`
    <div class="modal-header">
      <h3 class="modal-title">📋 ${editRep.nome}</h3>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>

    <div class="form-group" style="margin-bottom:20px">
      <label>Nome do Repertório</label>
      <div style="display:flex;gap:8px">
        <input id="rep-edit-nome" value="${editRep.nome}" style="flex:1">
        <button class="btn btn-ghost btn-sm" onclick="saveRepNome('${id}')">Salvar nome</button>
      </div>
    </div>

    <div class="two-col">
      <!-- Músicas selecionadas -->
      <div>
        <div class="col-title">
          <span>No Repertório (${(editRep.musicas||[]).length})</span>
        </div>
        <div class="drag-list" id="drag-selected" ondragover="event.preventDefault()" ondrop="onDrop(event,'selected')">
          ${(editRep.musicas||[]).map((m,i)=>`
            <div class="drag-item" draggable="true" data-id="${m.id}"
              ondragstart="dragSrc=this;this.classList.add('dragging')"
              ondragend="this.classList.remove('dragging')">
              <span class="drag-handle">⠿</span>
              <div class="di-info">
                <div class="di-title">${m.titulo}</div>
                <div class="di-artist">${m.artista} · <span style="color:var(--gold)">${m.tom}</span></div>
              </div>
              <button class="btn btn-danger btn-xs" onclick="removerDaLista('${m.id}')">✕</button>
            </div>
          `).join('') || '<div style="color:var(--text3);font-size:12px;text-align:center;padding:20px">Adicione músicas →</div>'}
        </div>
      </div>

      <!-- Disponíveis -->
      <div>
        <div class="col-title">Disponíveis (${disponiveis.length})</div>
        <input placeholder="Filtrar..." style="margin-bottom:8px;font-size:12px;padding:6px 10px"
          oninput="filtrarDisp(this.value)">
        <div class="avail-scroll" id="avail-list">
          ${renderDisponiveis(disponiveis)}
        </div>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-danger btn-sm" onclick="delRep('${id}','${editRep.nome.replace(/'/g,"\\'")}',true)">🗑️ Excluir</button>
      <button class="btn btn-ghost" onclick="closeModal()">Fechar</button>
      <button class="btn btn-green" onclick="closeModal();gerarPDF('${id}','${editRep.nome.replace(/'/g,"\\'")}')">📄 Gerar PDF</button>
    </div>`, 'modal-lg');
}

function renderDisponiveis(lista) {
  if(!lista.length) return '<div style="color:var(--text3);font-size:12px;text-align:center;padding:20px">Nenhuma disponível</div>';
  return lista.map(m=>`
    <div class="avail-item" onclick="adicionarNaLista('${m.id}')">
      <div class="di-info" style="flex:1">
        <div class="di-title">${m.titulo}</div>
        <div class="di-artist">${m.artista} · <span style="color:var(--gold)">${m.tom}</span></div>
      </div>
      <button class="btn btn-primary btn-xs">+</button>
    </div>`).join('');
}

async function filtrarDisp(q) {
  const todas = await api.get('/api/musicas' + (q ? `?q=${encodeURIComponent(q)}` : ''));
  const selIds = getSelectedIds();
  const disp = todas.filter(m=>!selIds.includes(m.id));
  const el = document.getElementById('avail-list');
  if(el) el.innerHTML = renderDisponiveis(disp);
}

function getSelectedIds() {
  return [...document.querySelectorAll('#drag-selected .drag-item')].map(el=>el.dataset.id);
}

async function adicionarNaLista(musicaId) {
  const selIds = getSelectedIds();
  if(selIds.includes(musicaId)) return;
  const novas = [...selIds, musicaId];
  await api.put(`/api/repertorios/${editRep.id}`, {musicas: novas});
  openEditRep(editRep.id);
}

async function removerDaLista(musicaId) {
  const novas = getSelectedIds().filter(id=>id!==musicaId);
  await api.put(`/api/repertorios/${editRep.id}`, {musicas: novas});
  openEditRep(editRep.id);
}

async function saveRepNome(id) {
  const nome = document.getElementById('rep-edit-nome').value.trim();
  if(!nome) return;
  await api.put(`/api/repertorios/${id}`, {nome});
  toast('✅ Nome salvo!');
  editRep.nome = nome;
  document.querySelector('.modal-title').textContent = '📋 ' + nome;
  renderRepertorios();
}

function onDrop(event, zone) {
  event.preventDefault();
  if(!dragSrc) return;
  const target = event.target.closest('.drag-item');
  const list = document.getElementById('drag-selected');
  if(target && target!==dragSrc) {
    const items = [...list.querySelectorAll('.drag-item')];
    const srcIdx  = items.indexOf(dragSrc);
    const tgtIdx  = items.indexOf(target);
    if(srcIdx<tgtIdx) list.insertBefore(dragSrc, target.nextSibling);
    else              list.insertBefore(dragSrc, target);
    saveOrder();
  }
}

async function saveOrder() {
  const novas = getSelectedIds();
  await api.put(`/api/repertorios/${editRep.id}`, {musicas: novas});
}

async function delRep(id, nome, fromModal=false) {
  confirm_del(`Excluir repertório "<strong>${nome}</strong>"?`, async()=>{
    await api.del(`/api/repertorios/${id}`);
    if(fromModal) closeModal();
    toast('🗑️ Repertório removido');
    renderRepertorios();
  });
}

// ══════════════════════════════════════════════════════════════════════
// GERAR PDF
// ══════════════════════════════════════════════════════════════════════
async function gerarPDF(id, nome) {
  loading(`Gerando PDF: ${nome}...`);
  try {
    const resp = await fetch(`/api/repertorios/${id}/pdf`);
    if(!resp.ok) {
      const err = await resp.json();
      throw new Error(err.erro||'Erro desconhecido');
    }
    const blob = await resp.blob();
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = nome.replace(/[^a-z0-9]/gi,'_') + '.pdf';
    a.click();
    URL.revokeObjectURL(url);
    toast('✅ PDF baixado!');
  } catch(e) {
    toast('❌ ' + e.message, 'err');
  } finally {
    unload();
  }
}
